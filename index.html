<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Propósito Acessórios</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="sticky-top bg-white shadow-sm p-3">
      <h1 class="h4">Propósito Acessórios</h1>
      <input id="search" class="form-control" placeholder="Buscar produtos" />
    </header>
    <div class="container py-3">
      <div class="d-flex gap-2 flex-wrap mb-3" id="filters"></div>
      <div id="products" class="row g-3"></div>
    </div>

    <div id="viewer" class="viewer d-none">
      <button id="closeViewer" class="btn btn-light back-btn">
        <i class="ph ph-arrow-left"></i> Voltar
      </button>
      <img id="viewerImg" class="viewer-img" />
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartCanvas">
      <div class="offcanvas-header border-bottom">
        <h5>Carrinho</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column h-100">
        <div id="cartItems" class="flex-grow-1 overflow-y-auto mb-3"></div>
        <div class="pt-3 border-top mb-3">
          <div class="d-flex justify-content-between align-items-center fs-5 fw-bold">
            <span>Total:</span>
            <span id="cartTotal">R$ 0,00</span>
          </div>
        </div>
        <button id="sendWhats" class="btn btn-success w-100 py-2">
          Enviar Pedido
        </button>
      </div>
    </div>

    <nav class="bottom-nav">
      <button id="homeBtn">🏠</button>
      <button data-bs-toggle="offcanvas" data-bs-target="#cartCanvas">
        🛒 <span id="count">0</span>
      </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
