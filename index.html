<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Propósito Acessórios</title>
    <!-- Decentraland UI (Semantic UI 2.4 com tema DCL) -->
    <link href="https://ui.decentraland.org/styles.css" rel="stylesheet" />
    <!-- Display font para a marca -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
  </head>
  <body>
    <!-- ─── HEADER ─── -->
    <header class="dcl-nav">
      <div class="dcl-nav-inner">
        <button class="dcl-logo" id="homeBtn">
          Propósito<span>Acessórios</span>
        </button>
        <button class="dcl-cart-trigger" id="cartBtn">
          <i class="ph ph-shopping-cart"></i>
          <span class="dcl-nav-badge" id="count">0</span>
        </button>
      </div>
    </header>

    <!-- ─── SEARCH ─── -->
    <div class="dcl-search-wrap">
      <div class="ui fluid icon input dcl-search">
        <input
          id="search"
          type="text"
          placeholder="Buscar joias e acessórios…"
        />
        <i class="ph ph-magnifying-glass icon"></i>
      </div>
    </div>

    <!-- ─── CATEGORY FILTERS ─── -->
    <div class="dcl-filters-wrap">
      <div id="filters"></div>
    </div>

    <!-- ─── PRODUCTS ─── -->
    <main class="dcl-main">
      <div id="products" class="dcl-grid"></div>
    </main>

    <!-- ─── IMAGE VIEWER ─── -->
    <div id="viewer" class="dcl-viewer">
      <button id="closeViewer" class="ui inverted button dcl-back-btn">
        <i class="ph ph-arrow-left"></i> Voltar
      </button>
      <img id="viewerImg" class="dcl-viewer-img" />
    </div>

    <!-- ─── CART SIDEBAR ─── -->
    <div id="cartOverlay" class="dcl-overlay"></div>
    <aside id="cartSidebar" class="dcl-sidebar">
      <div class="dcl-sidebar-head">
        <span class="dcl-sidebar-title">
          <i class="ph ph-shopping-cart-simple"></i> Carrinho
        </span>
        <button id="closeCart" class="ui inverted basic icon button">
          <i class="ph ph-x"></i>
        </button>
      </div>
      <div id="cartItems" class="dcl-cart-body"></div>
      <div class="dcl-cart-foot">
        <div class="dcl-total-row">
          <span>Total</span>
          <span id="cartTotal" class="dcl-total-value">R$ 0,00</span>
        </div>
        <button id="sendWhats" class="dcl-whats-btn">
          Enviar Pedido pelo WhatsApp <i class="ph ph-whatsapp-logo"></i>
        </button>
      </div>
    </aside>

    <!-- ─── BOTTOM NAV (mobile) ─── -->
    <nav class="dcl-bottom-nav">
      <button class="dcl-nav-btn" id="homeBtnMobile">
        <i class="ph ph-house"></i>
        <span>Início</span>
      </button>
      <button class="dcl-nav-btn" id="cartBtnMobile">
        <i class="ph ph-shopping-cart-simple"></i>
        <span>Carrinho</span>
        <span class="dcl-badge" id="countMobile">0</span>
      </button>
    </nav>

    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
